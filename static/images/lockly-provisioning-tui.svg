<svg width="800" height="520" xmlns="http://www.w3.org/2000/svg">
  <!-- Terminal window background -->
  <rect width="800" height="520" fill="#0a0e0a" rx="8"/>

  <!-- Terminal window header -->
  <rect width="800" height="32" fill="#1a1e1a" rx="8"/>
  <rect y="32" width="800" height="8" fill="#1a1e1a"/>

  <!-- Window control buttons -->
  <circle cx="16" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="36" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="56" cy="16" r="6" fill="#27c93f"/>

  <!-- Terminal title -->
  <text x="400" y="21" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888" text-anchor="middle">lockly_card_writer.sh</text>

  <style>
    .terminal-text {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 13px;
      line-height: 18px;
    }
    .green { fill: #00ff88; }
    .red { fill: #ff6b6b; }
    .yellow { fill: #ffd93d; }
    .cyan { fill: #6bcfff; }
    .gray { fill: #888; }
    .white { fill: #e0e0e0; }
    .dim { fill: #666; }
  </style>

  <!-- Terminal content -->
  <text class="terminal-text white" x="16" y="60">$ ./lockly_card_writer.sh 5</text>

  <text class="terminal-text cyan" x="16" y="84">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
  <text class="terminal-text cyan" x="16" y="102">Lockly Card Provisioning Tool</text>
  <text class="terminal-text cyan" x="16" y="120">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <text class="terminal-text white" x="16" y="144">Cards to provision: </text><text class="terminal-text yellow" x="200" y="144">5</text>
  <text class="terminal-text white" x="16" y="162">Lockly Sector 0 Key A: </text><text class="terminal-text green" x="240" y="162">FB5F52DEB87A</text>

  <text class="terminal-text dim" x="16" y="186">─────────────────────────────────────────────────</text>

  <text class="terminal-text white" x="16" y="210">[1/5] Place card on antenna and press Enter...</text>
  <text class="terminal-text gray" x="16" y="228">  ✓ Verified factory defaults on Sector 0</text>
  <text class="terminal-text gray" x="16" y="246">  ✓ Wrote Block 3 (Sector 0 trailer)</text>
  <text class="terminal-text gray" x="16" y="264">  ✓ Wrote Block 63 (Sector 15 trailer)</text>
  <text class="terminal-text green" x="16" y="282">  ✓ Card 1 provisioned successfully (8.2s)</text>

  <text class="terminal-text white" x="16" y="306">[2/5] Place card on antenna and press Enter...</text>
  <text class="terminal-text gray" x="16" y="324">  ✓ Verified factory defaults on Sector 0</text>
  <text class="terminal-text gray" x="16" y="342">  ✓ Wrote Block 3 (Sector 0 trailer)</text>
  <text class="terminal-text gray" x="16" y="360">  ✓ Wrote Block 63 (Sector 15 trailer)</text>
  <text class="terminal-text green" x="16" y="378">  ✓ Card 2 provisioned successfully (7.9s)</text>

  <text class="terminal-text white" x="16" y="402">[3/5] Place card on antenna and press Enter...</text>
  <text class="terminal-text gray" x="16" y="420">  ✓ Verified factory defaults on Sector 0</text>
  <text class="terminal-text gray" x="16" y="438">  ✓ Wrote Block 3 (Sector 0 trailer)</text>
  <text class="terminal-text gray" x="16" y="456">  ✓ Wrote Block 63 (Sector 15 trailer)</text>
  <text class="terminal-text green" x="16" y="474">  ✓ Card 3 provisioned successfully (8.4s)</text>

  <text class="terminal-text yellow" x="16" y="498">[4/5] Place card on antenna and press Enter...</text>
  <text class="terminal-text dim" x="420" y="498">▊</text>
</svg>