baseURL: "https://highzmash.com/"
title: "High-Z | Jon Mash"
paginate: 7
theme: PaperMod
languageCode: en-us
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "High-Z"
  description: "Engineering leadership, PCB design war stories, and the occasional side project. By Jon Mash."
  keywords: [Engineering, Leadership, PCB Design, Hardware, Electronics, Blog]
  author: Jon Mash
  images: ["/images/og-card.png"]
  DateFormat: "January 2, 2006"
  defaultTheme: dark
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    favicon: "/images/favicon.svg"
    favicon16x16: "/images/favicon-16x16.png"
    favicon32x32: "/images/favicon-32x32.png"
    apple_touch_icon: "/images/apple-touch-icon.png"
    disableHLJS: true

  label:
    text: "High-Z"
    iconHeight: 35

  # Profile mode for homepage
  profileMode:
    enabled: true
    title: "High-Z"
    subtitle: |
      Engineering leadership opinions, PCB design deep-dives,
      and the side projects that happen at weird hours.
      By **Jon Mash** — Principal Engineer & Founder, [Mash Engineering LLC](https://mashpcb.com)
    imageUrl: "/images/avatar.png"
    imageWidth: 120
    imageHeight: 120
    imageTitle: "Jon Mash"
    buttons:
      - name: Writing
        url: posts
      - name: Tags
        url: tags
      - name: About
        url: about

  homeInfoParams:
    Title: "High-Z"
    Content: >
      Engineering leadership opinions, PCB design deep-dives,
      and the side projects that happen at weird hours.

  socialIcons:
    - name: github
      url: "https://github.com/jonmash"
    - name: linkedin
      url: "https://linkedin.com/in/jonmash"
    - name: rss
      url: "/index.xml"
    - name: email
      url: "mailto:jon@mashpcb.com"

  analytics:
    google:
      SiteVerificationTag: ""

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  editPost:
    URL: "https://github.com/jonmash/highzmash.com/tree/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: writing
      name: Writing
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30
    - identifier: about
      name: About
      url: /about/
      weight: 40

# Enable search
outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  tag: tags
  category: categories
  series: series

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: dracula
